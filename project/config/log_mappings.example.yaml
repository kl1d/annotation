participant_folder_strategy: folder_name
timestamp_patterns:
  - name: bracket_seconds
    regex: '^\[(?P<timestamp_sec>\d+(?:\.\d+)?)\]\s*(?P<raw>.*)$'
command_patterns:
  - regex: '^(?P<command>[A-Za-z0-9_.\/-]+)'
file_rules:
  - glob: history.log
    default_event_class: history
    line_regex: '^[A-Z][a-z]{2}\s+\d+\s+\d+:\d+:\d+\s+[^:]+:\s+\[(?P<timestamp_iso>[^\]]+)\]\s+\[(?P<event_class>[^\]]+)\]\s+(?P<context>.+?)\s+-\s+(?P<raw>.*)$'
    skip_raw_regexes:
      - '^#\d+$'
    command_regex: '^(?P<command>.+)$'
  - glob: activity.log
    default_event_class: activity
    line_regex: '^[A-Z][a-z]{2}\s+\d+\s+\d+:\d+:\d+\s+[^:]+:\s+\[(?P<event_class>[^\]]+)\]\s*(?P<raw>.*)$'
  - glob: session-index.log
    default_event_class: session_index
    line_regex: '^\[(?P<timestamp_iso>[^\]]+)\]\s+(?P<event_class>\w+)\s+(?P<raw>.*)$'
event_class_rules:
  - contains: error
    event_class: error
  - contains: fail
    event_class: failure
  - contains: success
    event_class: success
default_event_class: raw
