<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="120" height="120" rx="20" fill="#0B1220"></rect>

  <!-- Timeline line -->
  <line x1="20" y1="70" x2="100" y2="70" stroke="url(#grad)" stroke-width="3"></line>

  <!-- Timeline nodes -->
  <circle cx="35" cy="70" r="4" fill="#3B82F6"></circle>
  <circle cx="55" cy="70" r="4" fill="#10B981"></circle>
  <circle cx="75" cy="70" r="4" fill="#F59E0B"></circle>

  <!-- Highlighted annotation node -->
  <circle cx="95" cy="70" r="6" fill="#8B5CF6"></circle>

  <!-- Annotation bubble -->
  <path d="M85 40
           Q85 30 95 30
           H105
           Q115 30 115 40
           V50
           Q115 60 105 60
           H100
           L95 65
           V60
           H95
           Q85 60 85 50 Z" fill="url(#grad)"></path>

  <!-- Gradient -->
  <defs>
    <linearGradient id="grad" x1="20" y1="30" x2="100" y2="90">
      <stop offset="0%" stop-color="#3B82F6"></stop>
      <stop offset="100%" stop-color="#8B5CF6"></stop>
    </linearGradient>
  </defs>
</svg>